<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Sent | Lumino Studio</title>
    <link rel="icon" href="assets/favicon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <style>
        .success-wrapper {
            text-align: center;
            padding: 60px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 50vh;
        }

        .success-icon {
            font-size: 4rem;
            color: #64ffda;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(100, 255, 218, 0.4);
        }

        .success-wrapper h1 {
            margin-bottom: 20px;
        }

        .success-wrapper p {
            margin: 0 auto 40px auto;
        }

        /* Rainbow button for the return trip */
        .home-btn {
            display: inline-block;
            padding: 12px 30px;
            border: 2px solid;
            border-image: var(--rainbow-grad) 1;
            color: white;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.05);
        }

        .home-btn:hover {
            background: var(--rainbow-grad);
            color: #020c1b;
            border-image: none;
        }
    </style>
</head>
<body>

    <div class="light-beam" style="animation: sweep 15s ease-in-out infinite alternate !important;"></div>

    <nav class="main-nav">
        <div class="nav-links">
            <a href="index.html" class="nav-item">Home</a>
            <a href="about.html" class="nav-item">About Us</a>
            <a href="products.html" class="nav-item">Products</a>
            <a href="contact.html" class="nav-item">Contact Us</a>
        </div>
    </nav>

    <div class="container">
        <div class="success-wrapper">
            <div class="success-icon">✓</div>
            <h1>Message Received</h1>
            <p>Thank you for reaching out to Lumino Studio. We've received your inquiry and our team will get back to you within 24–48 business hours.</p>
            
            <a href="index.html" class="home-btn">Return to Home</a>
        </div>

        <footer>
            &copy; 2026 Lumino Studio. ABN: 89695615233. Sydney, Australia.
        </footer>
    </div>

</body>
</html>
